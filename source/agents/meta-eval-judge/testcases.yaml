    【Input】
    请解释什么是 RESTful API，以及设计 RESTful API 时有哪些关键原则。

    【ExpectedOutput】
    RESTful API 是一种遵循 REST（Representational State Transfer）架构风格的 Web API 设计方式。

    **核心原则：**

    1. **资源导向**：每个 URL 代表一个资源，使用名词而非动词
       - 正确：GET /users/123
       - 错误：GET /getUser?id=123

    2. **HTTP 方法语义化**：
       - GET：获取资源
       - POST：创建资源
       - PUT：全量更新资源
       - PATCH：部分更新资源
       - DELETE：删除资源

    3. **无状态**：每个请求包含所有必要信息，服务器不保存客户端状态

    4. **统一接口**：使用标准的 HTTP 状态码、请求/响应格式（通常为 JSON）

    5. **版本管理**：通过 URL（/v1/users）或 Header 进行 API 版本控制

    【Judge】
    评估维度：
    - 概念准确性（40%）：REST 的定义是否准确，原则描述是否正确
      - 定义准确、原则无误得 40 分，有事实错误得 0-20 分
    - 完整性（35%）：是否覆盖了主要的 REST 原则（至少 4 条）
      - 覆盖 ≥5 条原则得 35 分，4 条得 25 分，3 条得 15 分，<3 条得 0-10 分
    - 示例质量（25%）：是否有具体的 URL/HTTP 方法示例来辅助理解
      - 有具体示例且正确得 25 分，无示例得 10 分

    【ActualOutput】
    REST 是 Roy Fielding 在 2000 年博士论文中提出的一种软件架构风格，全称 Representational State Transfer（表述性状态转移）。RESTful API 就是遵循这种风格设计的 Web 接口。

    REST 的核心约束：

    | 原则 | 说明 | 示例 |
    |------|------|------|
    | 资源标识 | 每个资源有唯一的 URI | /api/books/978-3-16-148410-0 |
    | 统一接口 | 使用标准 HTTP 动词操作资源 | GET 读取、POST 创建、PUT 更新、DELETE 删除 |
    | 无状态 | 请求之间相互独立，不依赖服务端会话 | 每个请求携带 Authorization header |
    | 分层系统 | 客户端无需知道是否直连服务器 | CDN、负载均衡对客户端透明 |
    | 可缓存 | 响应应标注是否可缓存 | Cache-Control: max-age=3600 |
    | 按需代码 | 服务端可返回可执行代码（可选约束） | 返回 JavaScript 片段供客户端执行 |

    实践建议：
    - URL 使用名词复数形式：/users 而非 /user 或 /getUsers
    - 善用 HTTP 状态码：201 Created, 404 Not Found, 422 Unprocessable Entity
    - 分页用 ?page=2&per_page=20，避免一次返回全部数据
    - 版本控制推荐 URL 前缀方式：/v2/users
