- Input: |-
    【Input】
    请用通俗易懂的语言解释什么是"量子纠缠"，并举一个生活中的类比。

    【ExpectedOutput】
    量子纠缠是量子力学中的一种现象，指两个粒子之间存在一种特殊的关联：无论它们相距多远，对其中一个粒子的测量会瞬间影响另一个粒子的状态。可以类比为一对神奇的骰子，无论相隔多远，当你掷出一个得到6，另一个一定得到1（总和为7）。

    【Judge】
    评估维度：
    - 科学准确性（40%）：量子纠缠的核心概念是否正确，不含误导性简化
      - 提到非局域关联得 20 分，提到测量影响状态得 20 分
    - 通俗性（35%）：解释是否真正通俗，非物理专业人士能否理解
      - 完全无专业术语或有术语但都解释了得 35 分，有未解释的术语得 15-20 分
    - 类比质量（25%）：类比是否贴切、易理解、不造成误解
      - 类比贴切且指出了类比的局限性得 25 分，贴切但未指出局限得 20 分，不贴切得 0-10 分

    【ActualOutput】
    **量子纠缠**，简单来说，就是两个微观粒子"命运相连"的奇妙现象。

    想象你有一双手套，把左手手套放在北京的箱子里，右手手套放在纽约的箱子里。当你在北京打开箱子，发现是左手手套，你瞬间就知道纽约那只一定是右手手套——不需要打电话确认。

    量子纠缠有点像这样，但更加神奇：
    1. **经典手套**：手套在装箱时就已经"决定"了左右，你只是不知道而已。
    2. **量子纠缠**：粒子在你观测之前，**真的没有确定的状态**（不是"已经决定了只是你不知道"），是你的观测行为"迫使"它选择了一种状态，而另一个粒子瞬间也"做出了对应的选择"。

    这意味着量子纠缠并非简单的"信息传递"或"远程通信"——爱因斯坦称之为"鬼魅般的超距作用"（spooky action at a distance），正是因为这种现象挑战了我们对因果关系的日常理解。

    ⚠️ **类比的局限**：手套类比只能帮助理解"关联性"，但它本质上是经典物理的描述。量子纠缠的真正奇异之处——观测前状态的不确定性——是手套类比无法完全传达的。
  ExpectedOutput: 待基线模型运行后填入
  Judge: |-
    评估维度：
    - 评分准确度（30%）：eval-judge 给出的总分是否在 95-100 区间（ActualOutput 在三个维度上均超越 ExpectedOutput：区分了经典关联与量子纠缠、指出类比局限性、引用爱因斯坦名言增强理解）
      - 总分在 95-100 得 30 分；在 90-94 得 20 分；在 85-89 得 10 分；低于 85 得 0 分
    - 区分度（15%）：是否在优点中标注了 [超越参考]，是否体现出该输出显著优于参考
      - 至少标注 2 处 [超越参考] 且分别指出超越点得 15 分；标注了但不具体得 8 分；未标注得 0 分
    - 输出格式合规性（15%）：是否严格包含五个区块（总分、各维度评分、数学验证、优点、不足、改进建议），不多不少
      - 完整包含所有区块得 15 分；缺少任一区块扣 3 分；格式混乱得 0 分
    - 证据引用质量（20%）：各维度评分中是否引用了 ActualOutput 的具体片段（如手套类比的内容、类比局限性的文字），不足中是否有 ActualOutput 与 ExpectedOutput 的对比引用
      - 至少 3 处具体片段引用得 20 分；1-2 处得 10 分；无引用得 0 分
    - 改进建议可操作性（10%）：建议是否面向提示词工程师、具体到可落地的提示词修改
      - 至少 1 条具体可操作建议得 10 分；笼统建议（如"提升回答质量"）得 0 分
    - 数学验证正确性（10%）：数学验证步骤中各维度得分之和是否等于报告总分
      - 计算完全正确得 10 分；有 >1 分误差得 0 分

    特殊关注点：本用例测试 eval-judge 对"超越参考"场景的识别能力——ActualOutput 明显优于 ExpectedOutput（区分经典关联与量子纠缠、指出类比局限、引用物理学家名言），eval-judge 必须识别并在评分中体现这一点，不能因"与参考不同"而不当扣分。
- Input: |-
    【Input】
    我的 MySQL 数据库查询越来越慢，有一条 SQL 要跑 15 秒，请帮我分析优化方向。SQL 如下：
    SELECT u.name, o.total, o.created_at FROM users u JOIN orders o ON u.id = o.user_id WHERE o.status = 'completed' AND o.created_at > '2024-01-01' ORDER BY o.created_at DESC LIMIT 100;

    【ExpectedOutput】
    这条 SQL 的优化可以从以下几个方面入手：

    1. **索引优化**：
       - 为 orders 表创建复合索引：CREATE INDEX idx_orders_status_created ON orders(status, created_at DESC, user_id);
       - 该索引覆盖了 WHERE 条件（status + created_at）和 JOIN 条件（user_id），且 created_at DESC 可避免额外排序
       - 检查 users 表的 id 是否已有主键索引（通常默认有）

    2. **EXPLAIN 分析**：
       - 建议先运行 EXPLAIN 查看当前执行计划
       - 关注 type 列是否为 ALL（全表扫描）、rows 估算值、Extra 中是否有 Using filesort

    3. **查询改写**：
       - 如果 orders 表数据量极大，可考虑先用子查询筛选再 JOIN：SELECT u.name, t.total, t.created_at FROM (SELECT user_id, total, created_at FROM orders WHERE status = 'completed' AND created_at > '2024-01-01' ORDER BY created_at DESC LIMIT 100) t JOIN users u ON u.id = t.user_id;

    4. **表结构优化**：
       - status 字段如果只有几个值，考虑用 TINYINT + 枚举替代 VARCHAR
       - created_at 确保是 DATETIME 类型而非 VARCHAR 存储

    【Judge】
    评估维度：
    - 索引建议质量（40%）：是否给出了具体的索引创建语句，索引列顺序是否合理（遵循最左前缀原则）
      - 给出复合索引语句且列顺序合理得 40 分，只建议"加索引"但没有具体语句得 15 分，索引列顺序不合理得 10 分
    - 分析方法论（25%）：是否建议使用 EXPLAIN 等诊断工具，是否有系统的分析思路
      - 建议 EXPLAIN + 说明关注指标得 25 分，只提到 EXPLAIN 未说关注什么得 15 分，未提及任何诊断工具得 0 分
    - 查询改写建议（20%）：是否给出了可行的查询改写方案
      - 给出具体改写 SQL 且逻辑正确得 20 分，给出思路但没有 SQL 得 10 分，未提及得 0 分
    - 完整性（15%）：是否从多个维度给出优化建议（索引、查询、表结构等），而非只关注单一方面
      - 覆盖 ≥3 个维度得 15 分，2 个维度得 10 分，仅 1 个维度得 5 分

    【ActualOutput】
    可以给 orders 表加个索引试试，索引能加速查询。另外数据量太大的话可以考虑分表。
  ExpectedOutput: 待基线模型运行后填入
  Judge: |-
    评估维度：
    - 评分准确度（30%）：eval-judge 给出的总分是否在 30-55 区间（ActualOutput 仅笼统提到"加索引"和"分表"，未给出具体索引语句、未建议 EXPLAIN、未提供查询改写、未做多维度分析）
      - 总分在 30-55 得 30 分；在 56-69 得 20 分（略高但可接受）；高于 70 得 0 分（严重偏高，未识别出重大缺失）；低于 20 得 10 分（过于严苛）
    - 区分度（15%）：评分是否体现出该输出质量明显不足，各维度评分是否有差异而非一刀切
