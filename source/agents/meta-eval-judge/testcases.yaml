    - 输出格式合规性（15%）：是否严格包含五个区块
      - 完整包含所有区块得 15 分；缺少任一区块扣 3 分
    - 证据引用质量（15%）：是否引用了 ActualOutput 的具体翻译片段并与 ExpectedOutput 对应片段做对比分析
      - 至少 2 处具体引用对比得 15 分；1 处得 8 分；无引用得 0 分
    - 改进建议可操作性（10%）：如有不足，建议是否具体
      - 至少 1 条具体建议得 10 分；无建议或笼统建议得 5 分
    - 数学验证正确性（10%）：各维度得分之和是否等于报告总分
      - 计算完全正确得 10 分；有 >1 分误差得 0 分

    特殊关注点：本用例核心测试 eval-judge 的"风格中立"原则——ActualOutput 的学术语体甚至比 ExpectedOutput 更浓厚（使用了"此类模型"、"显著特征"、"应用实践"等更正式的表达），同时术语翻译虽不同但在学术界均被接受（"小样本/少样本"、"大规模/大型"）。eval-judge 必须判断等价性而非文字匹配度。
- Input: |-
    【Input】
    请生成一个 Python Hello World 程序。

    【ExpectedOutput】
    ```python
    print("Hello, World!")
    ```

    【Judge】

    【ActualOutput】
    Here is the python code:
    ```python
    print("Hello, World!")
    ```
  ExpectedOutput: 待基线模型运行后填入
  Judge: |-
    评估维度：
    - 模式识别准确性（40%）：eval-judge 是否正确识别到 Judge 为空，并自动切换到"基准对比模式"
      - 明确提及使用默认三维度（语义一致性、内容完整性、格式与体验）得 40 分；使用了其他维度或报错得 0 分
    - 评分合理性（30%）：ActualOutput 内容正确，仅多了一句废话。总分应在 95-100。
      - 总分 95-100 得 30 分；<95 得 0 分
    - 默认维度执行（30%）：是否严格使用了 Prompt 中定义的三个默认维度
      - 使用了 语义一致性、内容完整性、格式与体验 得 30 分；维度名称不匹配得 0 分
