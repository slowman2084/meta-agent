    - 输出格式合规性（15%）：是否严格包含五个区块（总分、各维度评分、数学验证、优点、不足、改进建议）
      - 完整包含所有区块得 15 分；缺少任一区块扣 3 分
    - 证据引用质量（20%）：不足中是否引用了 ActualOutput 的原文片段（如"加个索引试试"）并与 ExpectedOutput 的具体内容（如索引创建语句）对比
      - 至少 2 处引用对比得 20 分；1 处得 10 分；无引用得 0 分
    - 改进建议可操作性（10%）：建议是否具体指向 Agent 提示词中应增加的推理步骤（如"要求先输出 EXPLAIN 分析再给建议"）
      - 至少 1 条具体可操作建议得 10 分；笼统建议得 0 分
    - 数学验证正确性（10%）：各维度得分之和是否等于报告总分
      - 计算完全正确得 10 分；有 >1 分误差得 0 分

    特殊关注点：本用例测试 eval-judge 对"中等质量输出"的区分度——ActualOutput 并非完全错误（确实提到了索引和分表），但严重缺乏深度和具体性。eval-judge 不应因"方向没错"就给出 70+ 的安全分，需准确识别缺失的关键内容。
- Input: |-
    【Input】
    请帮我将以下 Python 代码中的 bug 找出来并修复：
    def calculate_average(numbers):
        total = 0
        for num in numbers:
            total += num
        return total / len(numbers)

    【ExpectedOutput】
    这段代码有一个潜在的 bug：当传入空列表时，len(numbers) 为 0，会触发 ZeroDivisionError。

    修复方案：
    def calculate_average(numbers):
        if not numbers:
            return 0  # 或者 raise ValueError("列表不能为空")
        total = 0
        for num in numbers:
            total += num
        return total / len(numbers)

    额外建议：可以用 sum() 内置函数简化代码：return sum(numbers) / len(numbers)

    【Judge】
    评估维度：
    - Bug 识别准确性（50%）：是否准确找出空列表导致的 ZeroDivisionError
      - 准确识别核心 bug 得 40 分，同时指出了其他潜在问题（如非数字类型输入）额外得 10 分
    - 修复方案质量（30%）：修复代码是否正确、是否考虑了边界情况
      - 修复正确且给出了多种处理策略得 30 分，仅给出一种得 20 分
    - 代码改进建议（20%）：是否给出了代码风格或性能方面的改进建议
      - 建议使用内置函数或更 Pythonic 的写法得 20 分，仅修复 bug 无额外建议得 10 分

    【ActualOutput】
    这段代码看起来没问题。calculate_average 函数会遍历所有数字并求和，然后除以列表长度得到平均值。

    如果你想让代码更简洁，可以这样写：
    import statistics
    statistics.mean(numbers)

    这是 Python 标准库提供的求平均值函数，推荐使用。
  ExpectedOutput: 待基线模型运行后填入
  Judge: |-
    评估维度：
    - 评分准确度（30%）：eval-judge 给出的总分是否在 10-25 区间（ActualOutput 未识别核心 bug——空列表 ZeroDivisionError，反而声称"看起来没问题"，属于严重失职）
      - 总分在 10-25 得 30 分；在 0-9 得 25 分（偏低但可接受）；在 26-40 得 10 分；高于 40 得 0 分（未识别出 Agent 忽略了核心 bug）
    - 区分度（15%）：评分是否体现了"严重偏题"的判定——Agent 不仅没找到 bug，还错误宣称代码无问题
      - Bug 识别维度得 0 分且在不足中明确指出"误判代码无 bug"得 15 分；给了部分分数得 5 分
    - 输出格式合规性（15%）：是否严格包含五个区块
      - 完整包含所有区块得 15 分；缺少任一区块扣 3 分
    - 证据引用质量（20%）：是否引用 ActualOutput 中"看起来没问题"的原文，并与 ExpectedOutput 中"空列表时 ZeroDivisionError"对比
      - 有明确的原文对比引用得 20 分；有引用但对比不充分得 10 分；无引用得 0 分
    - 改进建议可操作性（10%）：是否建议在提示词中增加"先列出所有可能的边界输入再分析代码"等具体步骤
      - 至少 1 条指向提示词推理步骤改进的建议得 10 分；笼统建议得 0 分
    - 数学验证正确性（10%）：各维度得分之和是否等于报告总分
      - 计算完全正确得 10 分；有 >1 分误差得 0 分

    特殊关注点：本用例测试 eval-judge 对"错误诊断"的严肃处理——ActualOutput 不仅遗漏了 bug，还给出了"代码没问题"的错误结论。这比单纯遗漏更严重（可能误导用户），eval-judge 必须在评分中严厉反映这一点。
