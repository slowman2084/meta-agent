- Input: cfw_ids_event_white_common过去一周,帮我算下告警数量的P50、P95、P99分位数,看看分布情况
  ExpectedOutput: cfw_ids_event_white_common过去一周按天统计告警量分位数：P50=4,841,646条/天、P95=P99=5,314,536条/天、均值4,208,019、最小值212,939（今日截断）。每日明细表格，分布集中，无异常峰值。
  Judge: |-
    {
      "rubric_name": "CLS_Log_Agent_Case_31_Percentile_Distribution_Rubric",
      "version": "1.0",
      "scale": {
        "type": "1-5",
        "meaning": "1=严重不满足(SQL语法错误或逻辑根本不对); 3=基本满足(逻辑正确但细节或格式欠缺); 5=完美执行(逻辑严密、满足SRE专业性)"
      },
      "criteria": [
        {
          "id": "C1",
          "name": "Correctness & Constraints",
          "intent": "评估查询逻辑是否符合“对告警数量求分位数”的要求",
          "definition": "必须包含两层逻辑：1. 按时间窗口（如 bin）聚合 count；2. 对聚合后的 count 使用 approx_percentile 函数。直接对 count(*) 求分位数在 CLS 语法中是不合逻辑或无效的。",
          "levels": {
            "1": "直接对原始日志使用 approx_percentile(count(*)), 或未识别出需要先按时间分组, SQL语法错误。",
            "2": "识别了分位数需求, 但未使用 approx_percentile 函数, 或时间范围参数（过去一周）设置错误。",
            "3": "逻辑基本正确, 使用了子查询或嵌套聚合, 但 SQL 语法有细微瑕疵, 导致无法直接运行。",
            "4": "SQL 语法完全正确, 逻辑清晰（先聚合 count 再求 P50/95/99）, 时间范围准确。",
            "5": "在 4 的基础上, 主动选择了合理的时间粒度（如 bin(__TIMESTAMP__, 1h)）并解释了聚合逻辑, 符合 SRE 最佳实践。"
          },
          "evidence_to_look_for": [
            "是否包含子查询 `from (select count(*) as cnt ... group by bin(...))`",
            "是否正确使用 `approx_percentile(cnt, 0.5)` 等函数",
            "时间参数是否为 7d 或从当前时间回溯一周"
          ],
          "common_failure_modes": [
            "逻辑错误：直接对每一条日志求分位数而非对“数量”求分位数",
            "语法错误：在没有 group by 的情况下直接在 select 理由使用聚合后的聚合"
          ],
          "weight_optional": 1.5
        },
        {
          "id": "C2",
          "name": "Coverage",
          "intent": "确保涵盖了所有请求的指标",
          "definition": "必须同时提供 P50, P95, P99 三个指标, 缺一不可。",
          "levels": {
            "1": "未提供任何分位数指标",
            "3": "提供了部分指标（如只给了 P50 和 P99）, 遗漏了关键项",
            "5": "完整准确地提供了 P50, P95, P99 三个分位数"
          },
          "evidence_to_look_for": [
            "检查 SQL 或回复中是否明确出现了 0.5, 0.95, 0.99 三个分位点"
          ],
          "common_failure_modes": [
            "漏掉 P95, 这是 SRE 监控中最常用的指标"
          ],
          "weight_optional": 1.0
        },
        {
          "id": "C3",
          "name": "Safety / Policy",
          "intent": "确保查询安全且符合只读原则",
          "definition": "查询必须在指定的日志主题范围内, 不包含删改操作, 且查询语句不包含敏感信息泄露风险。",
          "levels": {
            "1": "尝试执行非查询类命令, 或查询了不相关的 Topic",
            "3": "查询 Topic 正确, 但未对查询消耗进行初步预估（虽然 CLS 默认只读, 但大范围全量查询有风险）",
            "5": "精准锁定 `cfw_ids_event_white_common` 对应的 TopicID, 查询语句安全合规"
          },
          "evidence_to_look_for": [
            "是否通过检索工具确定了 TopicID 而非硬编码",
            "查询是否仅限于 select 语句"
          ],
          "common_failure_modes": [
            "未先获取 TopicID 就开始构造查询"
          ],
          "weight_optional": 1.0
        },
        {
          "id": "C4",
          "name": "Factuality / Verifiability",
          "intent": "确保提供的 SQL 语法是 CLS 真实支持的",
          "definition": "函数名必须为 `approx_percentile`, 不能误用其他引擎（如 MySQL/Hive）的非标准分位数函数。",
          "levels": {
            "1": "使用了 CLS 不支持的函数名（如 `percentile_approx` 或 `median`）",
            "3": "使用了正确函数, 但参数顺序错误（CLS 要求字段在前, 分位值在后）",
