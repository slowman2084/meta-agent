        {
          "id": "C4",
          "name": "Clarity / Style (Presentation)",
          "intent": "评估报告的呈现质量和专业度",
          "definition": "响应应采用结构化格式（如表格），语言应符合运维/研发专家的身份，简洁专业",
          "levels": {
            "1": "输出为杂乱的 JSON 或未格式化的文本，极难阅读",
