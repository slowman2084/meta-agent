- Input: 帮我看下omp-trace-log最近1天有哪些接口报错了,按错误数排个序
  ExpectedOutput: |-
    **工具调用过程：**
    1. GetTopicInfoByName：成功获取 Topic 信息（TopicId: 310ded45-de57-4284-9290-24b49e2708d0）
    2. SearchLog: 获取字段探查结果， 得出基于基数和字段价值的分析
    3. SearchLog：获取到4xx 和 5xx 的多条日志记录，并且两次内调用完成获取

    **输出：**
    | # | 接口 | retcode | 错误信息 | 错误数 |
    |---|------|---------|---------|--------|
    | 1 | `/api/system-manager/feedback/score` | 401 | 登录遇到点问题，请重新登录 | **888** |
    | 2 | `/api/index/checkActivityTime?activityKey=LUCKY_CHARM` | 401 | 登录遇到点问题，请重新登录 | **870** |
    | 3 | `/panshi/readSavePageRoutesDate?redisKey=_bi&env=prod` | 2020 | 登录鉴权错误，联系liamhuang | **826** |
    | 4 | `/panshi/savePageRoutes` | 2020 | 登录鉴权错误，联系liamhuang | **532** |
    | 5 | `/api?csm/getAccountInfoByCid` | -501001 | Timeout 28000ms | **5** |
    | 6 | `/api?tpms/post.api.hrManage.hrPlan.finishedList` | -501003 | 后台服务发生错误，联系liamhuang | **5** |
    | 7 | `/api?effect/submitEffect` | -501001 | Timeout 58000ms | **4** |
    | 8 | `/api/v2/static/not.found` | 401 | 登录遇到点问题 | 2 |
    | 9 | `/api?cdata-astro-http/CheckGroupUser` | -501001 | connect ETIMEDOUT 11.167.7.153:80 | 2 |
    | 10 | `/api?jf-gateway/qcloud.Deal.getDealsByOwner` | -501001 | Timeout 28000ms | 2 |  

    **关键洞察**:
    1. 401 错误的根因是 HeadlessChrome 自动化任务的 session 过期
    > CQL：status:401 | select count(*), count_if(detail LIKE '%HeadlessChrome%')

    3,120 条 401 错误中，3,116 条来自 HeadlessChrome（99.9%）。 而全量 171 万条日志中，HeadlessChrome 请求只占 2.83%（48,571 条）——也就是说，一个仅占总流量 3% 的来源，却贡献了 99% 的错误。报错的可能性是普通请求的 35 倍。

    2. 这些 401 全部是未登录状态的请求
    > CQL：status:401 | select count_if(staffname = 'null')

    3,120 条 401 错误中，staffname 全部为 null（100%）。 全量日志中 staffname 为 null 的比例只有 10.5%。换句话说，"没有登录态"这个特征在 401 错误中的出现频率，是正常水平的 9.5 倍。

    3. 这些请求全部来自 Linux 服务器，不是真实用户
    > CQL：status:401 | select count_if(detail LIKE '%X11; Linux x86_64%')

    3,120 条 401 中，3,118 条的 User-Agent 平台是 Linux（99.9%）。真实用户用 Windows/Mac 浏览器，不会报这个 UA。
  Judge: |-
    {
      "rubric_name": "CLS_Log_Agent_Interface_Error_Analysis_Rubric",
      "version": "1.0",
      "scale": {
        "type": "1-5",
        "meaning": "1=严重不满足需求; 3=基本完成任务但有关键缺失; 5=专业且精准的分析报告"
      },
      "criteria": [
        {
          "id": "C1",
          "name": "Correctness & Constraints (Tool & Logic)",
          "intent": "评估 Agent 是否正确识别日志主题、转换时间范围并构造了合法的检索语句",
          "definition": "Agent 必须准确将 'omp-trace-log' 映射为对应的 TopicId，正确处理 '最近1小时' 的时间偏移，并生成包含 GROUP BY 和 ORDER BY 的 SQL/CQL 语句",
          "levels": {
            "1": "未能识别 omp-trace-log 或使用了错误的 TopicId；时间范围错误（如用了绝对时间而非动态偏移）；SQL 语法错误导致无法运行",
            "2": "识别了主题但检索逻辑有误（如漏掉错误过滤条件 status != 200）；或者未进行时间转换直接查询",
            "3": "核心逻辑正确，能查到数据，但 SQL 细节有瑕疵（如排序方向反了，或者未过滤掉心跳接口等噪点）",
            "4": "逻辑完全正确，使用了高效的 SQL 聚合函数，时间范围精准，TopicId 匹配无误",
            "5": "在 4 的基础上，展现了卓越的工具编排，例如先查询 Topic 详情确认 Schema 再构造高精度的 SQL"
          },
          "evidence_to_look_for": [
            "是否调用了检索工具并传入了正确的 TopicId (对应 omp-trace-log)",
            "SQL/CQL 语句中是否包含 `GROUP BY interface_name` (或等价字段)",
            "SQL/CQL 语句中是否包含 `ORDER BY count(*) DESC` 或类似排序逻辑",
            "时间参数是否为当前时间减去 3600 秒"
