- Input: d036bd9c-6a9d-4567-8d3b-a1d93a452dc9的日志里最近3天有多少个不同的instance_id在上报数据
  ExpectedOutput: |-
    **工具调用过程：**
    1. SearchLog: 当用户需要计数的时间范围大于1天且用户没有明确要求准确计数时，自动选择 approx_distinct(instance_id) 近似去重统计（误差率约 ±2%）

    **输出：**
    最近 3 天（2026-02-27 ~ 2026-03-02）共有约 104,697 个不同的 instance_id 
    说明：由于数据量较大，使用了 approx_distinct 近似去重函数统计，结果有约 2% 的误差范围，实际值在 10.3 万 ~ 10.7 万之间。
    > * | SELECT approx_distinct(instance_id) AS instance_count

    查询说明：
    - 每次查询的最近 3 天是不同的，上面是为了表达输出的时候要给出最近三天的时间范围
