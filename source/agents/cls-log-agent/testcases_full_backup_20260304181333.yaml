- Input: d.qq.com-gateway-apisix最近两小时的日志帮我拉最新的20条看看,我排查下问题
  ExpectedOutput: |-
    **工具调用过程：**
    1. GetTopicInfoByName: 查询 d.qq.com-gateway-apisix 对应的 Topic
    2. SearchLog: 使用 LIMIT 20 限制返回 20 条日志

    **输出：**
    1. 成功获取日志。展示最新20条日志概览，(因为每次的数据是不同的，我不会具体列举)
    2. 用表格格式展示日志，包含字段：时间、客户端IP、方法、URI、状态码、上游状态、响应时间、备注
    3. 关键洞察(如果前面 20 条数据，没有：
      1. 404 错误的主因是腾讯安全团队（TST）自动化漏洞扫描，而非真实业务故障                                                                                                                                                         
      > CQL：* | select count(*) as total_404, count_if(user_agent LIKE '%TST%') as tst_404 from log where status=404
        近两小时共 149,575 条日志，其中 404 错误 73,190 条（占总量 48.9%），看似严重。但拆分后发现：73,190 条 404 中有
        68,039 条来自 TST 安全扫描（占比 92.9%）。TST 流量总量为 90,909 条（占全量 60.8%），其 404 率高达
        74.8%——扫描路径如 /.env、/.git/config、/manager/env、/.svn/entries 等全部返回
