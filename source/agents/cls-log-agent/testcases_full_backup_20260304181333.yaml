      "judge_instructions_snippet": "请作为一名腾讯云 CLS 专家评估该回答。重点检查：1. 检索语句的正确性（TopicId 是否匹配 omp-trace-log，是否有聚合排序）；2. 数据呈现是否使用了易读的表格；3. 语气是否专业。请先给出各维度分值和判定证据，最后汇总总分。",
