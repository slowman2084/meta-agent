- Input: cfw_ids_event_white_common最近一天的数据,帮我看下被拦截和放行的事件各有多少,占比分别是多少
  ExpectedOutput: |-
    根据查询结果，我已完成对 `cfw_ids_event_white_common` Topic 最近一天数据的分析。

    ---

    ## 📋 **摘要**
    **估算值，误差 ≤5%（腾讯云CLS HyperLogLog实现）** | 2026-03-14 18:46:02 ~ 2026-03-15 18:46:02 | Topic: cfw_ids_event_white_common

    ---

    ## 🔍 **核心结论**

    该 Topic 记录的是 **云防火墙 IDS 入侵检测白名单事件**，最近一天内所有事件均为 **被拦截状态**，无放行事件。

    ---

    ## 📊 **关键数据**

    | 事件类型 | 数量（估算） | 占比 |
    |---------|-------------|------|
    | 🚫 **被拦截** (is_blocked=1) | 3,273 条 | **99.88%** |
    | ✅ **放行** (is_blocked=0) | 0 条 | **0%** |
    | **总计** | ~3,273 条 | 100% |

    ---

    ## 📝 **详细证据**

    ```sql
    -- 统计拦截/放行事件数量及占比
    * | SELECT 
      is_blocked,
      count(*) AS event_count,
      round(count(*) * 1.0 / (SELECT count(*) FROM log), 4) AS ratio 
    GROUP BY is_blocked
    ```

    **关键字段说明**：
    - `is_blocked`: 拦截状态标识
      - `1` = 被拦截
      - `0` = 放行
    - `action`: 动作标识（与 is_blocked 对应）
    - `blocked_reason`: 拦截原因代码
    - `threat_name`: 威胁名称
    - `attack_vector`: 攻击特征标识

    ---

    ## 🛠️ **建议**

    1. **安全态势确认**：该 Topic 所有事件均被拦截，说明 IDS 规则生效正常，白名单机制按预期工作。

    2. **下一步洞察**：如需深入分析，建议：
       - 按 `attack_vector` 分组查看主要攻击类型分布
       - 按 `srcIP` 统计攻击来源 IP 分布，识别高频攻击源
       - 按 `req_host` 分析受攻击的目标域名

    3. **如需查询放行事件**：该 Topic 当前无放行记录，如需查看放行事件，可能需要检查其他 Topic 或调整 IDS 策略配置。

