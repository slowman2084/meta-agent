ling 参数缺失或被设置为 false/关闭）。\n  points: -15\n  tags:\n  - axis:reliability\n  - type:negative\n- criterion: 查询涉及窗口函数、多步聚合、CASE WHEN 分桶、CONCAT 拼接、正则匹配等复杂分析场景，但未调用 TextToSearchLogQuery 工具，而是自行构造复杂 SQL 后直接提交执行（简单 GROUP BY + COUNT 自行构造不在此列）\n  points: -10\n  tags:\n  - axis:accuracy\n  - type:negative\n- criterion: 区间定义存在端点重叠（如同时将 request_time = 1 归入两个区间）或存在覆盖盲区（如遗漏 request_time = 0 的情况），导致统计口径错误。\n  points: -10\n  tags:\n  - axis:accuracy\n  - type:negative\n- criterion: 结果只展示了请求数而未展示占比，或只展示了占比而未展示请求数，不满足同时呈现双指标的要求。\n  points: -8\n  tags:\n  - axis:completeness\n  - type:negative\n- criterion: 当检索返回空结果时，Agent 对空结果的业务含义进行了分析（如区分'该时段确实无异常事件'和'采集可能中断'），并给出至少 2 种可能原因和对应排查建议\n  points: 8\n  tags:\n  - axis:value\n  - type:positive"
