me, abnormal_cnt FROM cluster_stats ORDER BY abnormal_cnt DESC LIMIT 10; ```\n```sql -- 本次实际可稳定执行并产出统计结果的等价查询 (status:die OR status:exec_die OR status:kill OR status:destroy) AND cluster | SELECT regexp_extract(actor, '\\\\\"cluster\\\\\":\\\\\"([^\\\\\"]+)', 1) AS cluster_name, COUNT(*) AS cnt GROUP BY cluster_name HAVING cluster_name IS NOT NULL ORDER BY cnt DESC LIMIT 10 ```\n```sql -- 异常状态分布 status:die OR status:exec_die OR status:kill OR status:destroy | SELECT status, COUNT(*) AS cnt GROUP BY status ORDER BY cnt DESC LIMIT 10 ```\n**关键日志样本** - `2026-03-15 23:58:55 +08:00` - `status=destroy` - `cluster=playground-service-prod-daemonset` - `namespace=devops` - `pod=playground-service-prod-daemonset-67pfv`\n**补充说明** - `WITH` 写法在当前 `SearchLog` 执行时未稳定返回聚合结果，本次已按规范**降级为等价可执行查询**完成统计。 - `异常状态` 口径是根据该 Topic 的 `status` 实际取值推断，不是平台预置枚举；如你们内部对“异常启动”另有明确定义，需要替换过滤条件。\n🛠️ **建议 / 下一步洞察** - [ ] **先下钻 Top1 cluster**：对 `playground-service-prod-daemonset` 再按 `status/action/event_time` 做 1 小时粒度聚合，确认这些 `destroy` 是否集中在固定时段。若集中在发布/回收窗口，更像**正常运维动作被纳入异常口径**。 - 推荐查询条件：`status:destroy AND playground-service-prod-daemonset` - [ ] **校正异常口径**：当前 `exec_die` 占异常约 90.1%，建议把 `exec_*` 类探针/健康检查动作与真正容器失败分开统计，否则会把健康探针退出混进“启动异常”。 - [ ] **优先补齐 cluster 结构化字段**：现在只有约 **0.7%** 的异常样本能稳定归属到 cluster，按 cluster 做全量归因会失真。建议将 `actor.Attributes.cluster` 在采集侧展开成独立字段后再做长期看板。"
