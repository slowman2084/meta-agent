    ## 结论

    **波动非常大。** 但本质是"双峰分布"——绝大多数请求极快（P50 ≈ 0.02~0.09ms），少量请求严重卡顿（P99 可达数秒~数十秒），均值和标准差被长尾极度拉高。

    波动严重程度的量化指标：**变异系数（CV = stddev / avg）**

    - 正常时段：CV ≈ 5~15

    - 异常时段：CV 达到 **33~53**，即标准差是均值的数十倍

