  ExpectedOutput: "📋 **摘要**：2026-03-14 00:00:59 ～ 2026-03-16 00:00:59 | `d.qq.com-clb-prod` | `request_time` 绝大多数集中在 **0-1 秒**，但仍有一批明显长尾落在 **5 秒以上** | **估算值，误差 ≤5%（本次因 48h 范围启用 SamplingRate=0.1 采样）**\n🔍 **核心结论** 过去两天里，`request_time` 主要集中在 **0-1 秒**，占比约 **93.81%**；但 **5 秒以上** 的慢请求约 **4,820** 个，占比 **6.02%**，明显高于 **1-5 秒** 区间（仅 **133** 个，约 **0.17%**）。 口语化看：这批请求不是“普遍变慢”，而是更像**少量请求直接拖到很慢**，长尾主要堆在 **5 秒以上**。\n📊 **关键数据**\n| request_time 区间 | 请求数（估算） | 占比 | |---|---:|---:| | 0-1 秒 | 75,108 | 93.81% | | 1-5 秒 | 133 | 0.17% | | 5 秒以上 | 4,820 | 6.02% | | **合计** | **80,061** | **100%** |\n补充观察： - **5 秒以上** 请求量约是 **1-5 秒** 的 **36.2 倍** - 本次结果中未出现“其他”分桶，说明采样结果里未见明显异常值落入统计外桶\n📝 **详细证据** ```sql * | select case when cast(request_time as double) >= 0 and cast(request_time as double) < 1 then '0-1秒' when cast(request_time as double) >= 1 and cast(request_time as double) < 5 then '1-5秒' when cast(request_time as double) >= 5 then '5秒以上' else '其他' end as request_time_bucket, count(*) as request_count group by request_time_bucket order by request_count desc limit 10 ```\n🛠️ **建议 / 下一步洞察** - 建议直接下钻 **`request_time >= 5`** 这批慢请求，分别按 **`status`、后端实例/后端 IP、请求路径** 做 Top 10 聚合，先确认慢请求是否集中在某几个后端或某类接口。 - 若你要，我下一步可以继续帮你看：**5 秒以上请求主要集中在哪些 `status` / `server_ip` / URL**。"
