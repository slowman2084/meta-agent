- Input: 帮我看下omp-trace-log最近1天有哪些接口报错了,按错误数排个序
  ExpectedOutput: "---\n\n## 📋 摘要\n\n**时间范围**: 2026-03-14 17:48:25 ~ 2026-03-15 17:48:25 (最近1天)  \n**Topic**: omp-trace-log (310ded45-de57-4284-9290-24b49e2708d0)  \n**关键发现**: 整体错误率约 **1.36%**，主要为 401 未授权错误，500 服务端错误极少（仅 3 条）  \n**⚠️ 估算值，误差 ≤5%（腾讯云CLS HyperLogLog实现）**\n\n---\n\n## 🔍 核心结论\n\n1. **系统整体健康**: 200 成功响应占比 **98.5%**（176,845 次），错误率处于正常水平\n2. **主要错误类型**: **401 未授权错误**（2,429 次，占错误总数的 **99.8%**），疑似认证/鉴权问题或扫描探测行为\n3. **500 服务端错误极少**: 仅 3 条，分布在 3 个不同接口，无集中爆发点\n4. **高频错误接口**: `/api/system-manager/feedback/score` 以 1,163 次 401 错误位居榜首\n\n---\n\n## 📊 关键数据\n\n### 状态码分布\n\n| 状态码 | 次数 | 占比 | 说明 |\n|--------|------|------|------|\n| 200 | 176,845 | 98.5% | 正常响应 |\n| 401 | 2,429 | 1.35% | 未授权（主要错误） |\n| null | 154 | 0.09% | 无状态码（可能连接失败） |\n| 302 | 139 | 0.08% | 重定向 |\n| 404 | 2 | <0.01% | 资源不存在 |\n| 500 | 2 | <0.01% | 服务端错误 |\n\n### Top 10 错误接口（按错误数排序）\n\n| 排名 | 接口 URL | 状态码 | 错误次数 | 错误类型 |\n|------|----------|--------|----------|----------|\n| 1 | `/api/system-manager/feedback/score` | 401 | 1,163 | 未授权 |\n| 2 | `/api/index/checkActivityTime?activityKey=LUCKY_CHARM` | 401 | 475 | 未授权 |\n| 3 | `/panshi/readSavePageRoutesDate` | 401 | 420 | 未授权 |\n| 4 | `/panshi/savePageRoutes` | 401 | 273 | 未授权 |\n| 5 | `/panshi/readReferrer` | 401 | 6 | 未授权 |\n| 6 | `/api/.env` | 401 | 3 | 未授权（疑似扫描） |\n| 7 | `/api/actuator/health` | 401 | 3 | 未授权 |\n| 8 | `/api/v1/status/flags` | 401 | 3 | 未授权 |\n| 9 | `/api/dashboard/866620/query` | 404 | 2 | 资源不存在 |\n| 10 | `/api/v1/database/2` | 401 | 2 | 未授权 |\n\n### 500 错误详情（需重点关注）\n\n| 接口 URL | 状态码 | 错误次数 |\n|----------|--------|----------|\n| `/api?legacy_billing-cpq-cbm-backend/cbm.CpqConfigMgtAdmin.batchGetSpuByCategory` | 500 | 1 |\n| `/api?tpms/post.api.hrManage.hrPlan.finishedList` | 500 | 1 |\n| `/api?jf-quotation/qcloud.effect.mistakeProductValidate` | 500 | 1 |\n\n---\n\n## 📝 详细分析\n\n### 401 错误分析\n- **特征**: 大量 401 错误集中在 `/api/system-manager/feedback/score` 等系统管理类接口\n- **可能原因**:\n  1. Token 过期或失效导致用户会话中断\n  2. 部分接口未正确传递认证信息\n  3. 存在自动化扫描/探测行为（如 `/api/.env`、`/api/actuator/health` 等敏感路径访问）\n  4. 权限配置变更导致部分用户失去访问权限\n\n### 500 错误分析\n- **特征**: 仅 3 条，分散在不同业务模块（billing、hrManage、quotation）\n- **评估**: 属于偶发性错误，无系统性故障迹象\n- **建议**: 可进一步查看具体错误堆栈定位根因\n\n---\n\n## 🛠️ 建议\n\n### 立即行动\n- [ ] **排查 401 错误根因**: 针对 `/api/system-manager/feedback/score` 接口，检查认证中间件配置和 Token 验证逻辑\n- [ ] **安全扫描防护**: 对 `/api/.env`、`/api/actuator/*` 等敏感路径访问进行监控，确认是否为恶意扫描\n\n### 下一步洞察\n1. **下钻 Top 1 错误**: 查询 `/api/system-manager/feedback/score` 401 错误的用户分布和时间分布，确认是特定用户问题还是普遍现象\n2. **对比历史基线**: 对比昨日/上周同期 401 错误量，判断是否为新增问题\n3. **500 错误详情**: 查看 3 条 500 错误的具体堆栈信息，定位代码问题\n\n如需进一步分析，请告知具体方向（如查看某个接口的详细日志、按用户维度分析等）。"
  Judge: "- criterion: 识别到 'omp-trace-log' 是 Topic 名称（而非 UUID 格式），并调用了 GetTopicInfoByName 工具获取对应的 TopicId\n  points: 18\n  tags:\n  - axis:accuracy\n  - type:positive\n- criterion: 调用了时间转换工具（而非手算）将'最近1天'转换为具体的起止时间戳\n  points: 10\n  tags:\n  - axis:reliability\n  - type:positive\n- criterion: 构造了聚合查询语句，用于统计各接口的错误数并排序（无论通过 TextToSearchLogQuery 生成还是 Agent 直接手写有效 CLS SQL，均视为合格）\n  points: 18\n  tags:\n  - axis:accuracy\n  - type:positive\n- criterion: 最终执行的 SQL 中包含按接口字段（如 url / path / api / method 等）的 GROUP BY、错误计数 COUNT(*)、以及 ORDER BY error_count DESC 排序三要素\n  points: 12\n  tags:\n  - axis:accuracy\n  - type:positive\n- criterion: 最终结果以表格形式呈现接口名称与对应错误数的排行榜（至少2列：接口名、错误次数）\n  points: 10\n  tags:\n  - axis:readability\n  - type:positive\n- criterion: 对查询结果给出口语化解读，明确指出错误数最高的接口名称及其错误量，而非仅输出裸数据\n  points: 10\n  tags:\n  - axis:value\n  - type:positive\n- criterion: 【加分项】洞察部分包含深度归因分析：使用 count_if 量化特定特征在错误集合 vs 全量日志中的比例对比。注：此条为增值服务要求，基础排序查询可不满足。\n  points: 12\n  tags:\n  - axis:value\n  - type:positive\n- criterion: 在选择 GROUP BY 字段前，Agent 通过 CoT 推理或字段嗅探评估了候选字段的区分度（如字段基数、值分布、业务含义），优先选择高价值字段（如接口路径 url/path、错误码 status/retcode），而非直接选取区分度低的字段（如 trace_id/请求唯一标识 等几乎每行不同的字段）\n  points: 8\n  tags:\n  - axis:accuracy\n  - type:positive\n- criterion: 输出末尾包含至少一条可操作的下一步建议，需包含具体的查询参数（Topic 名称、时间段、字段名、过滤条件中至少一项），仅提供泛化描述（如'建议排查'、'需关注'、'建议进一步分析'）不满足要求\n  points: 5\n  tags:\n  - axis:value\n  - type:positive\n- criterion: 输出摘要中明确标注了查询的时间起止范围（如 '2026-03-10 23:08 ~ 2026-03-11 23:08'），使读者可直接确认查询窗口；若额外声明了采样状态或数据量风险提示，同样视为满足。\n  points: 7\n  tags:\n  - axis:reliability\n  - type:positive\n- criterion: 输出结构遵循金字塔原则：先给出结论性摘要（如'共发现 N 个接口存在报错，top1 为 XXX'），再展示排行数据，最后才呈现原始证据或建议\n  points: 5\n  tags:\n  - axis:readability\n  - type:positive\n- criterion: 调用了 GetTopicInfoByName 工具（用户已显式提供标准 UUID 格式的 TopicId，此调用属于冗余操作，降低执行效率但不影响结果正确性）\n  points: -8\n  tags:\n  - axis:accuracy\n  - type:negative\n- criterion: 在工具调用链中无任何时间转换工具的调用记录，且推理过程中直接硬编码了预计算的时间戳数值（如无工具调用失败的降级证据），视为主动跳过时间工具\n  points: -15\n  tags:\n  - axis:reliability\n  - type:negative\n- criterion: 在单次响应中展示超过10条原始日志明细，造成信息过载\n  points: -10\n  tags:\n  - axis:usability\n  - type:negative\n- criterion: 当检索返回空结果时，Agent 对空结果的业务含义进行了分析（如区分'该时段确实无异常事件'和'采集可能中断'），并给出至少 2 种可能原因和对应排查建议\n  points: 8\n  tags:\n  - axis:value\n  - type:positive"
