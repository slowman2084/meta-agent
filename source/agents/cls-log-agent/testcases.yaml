* | SELECT\n    COUNT_IF(regexp_extract(__CONTENT__, 'server request:/([^/,\\s]+)', 1) IS NOT NULL) AS request_path_count,\n    COUNT_IF(regexp_extract(__CONTENT__, 'server request:/[^/,\\s]+/([^/,\\s]+)', 1) IS NOT NULL) AS module_service_count,\n    COUNT(*) AS total_log_count\n```\n\n**说明**  \n- 原始日志里**未直接看到可稳定聚合的独立 `module` / `service` 字段**，本次改用 `server request` 路径前两段替代。  \n- `/sse/` 只有一段路径，所以**不能拼成 `module:service`**，已单独列出。  \n\n## 🛠️ 建议\n- [ ] **若要看真正业务服务调用量**：建议下一步**排除 `/sse/` 和明显扫描路径**后再出一版净化统计，只保留正常业务服务标识。\n- [ ] **若要看安全风险**：建议对 `http::tst2.qq.com`、`etc:passwd`、`debug:pprof`、`C::Windows` 这类路径，按 `Source` 聚合 Top 来源并联动 WAF/黑名单。\n- [ ] **若要我继续下钻**：我建议下一步直接查  \n  `server request:/etc/passwd OR server request:/debug/pprof OR server request:/C:/Windows OR server request:/http:/`  \n  再按来源 IP/时间段聚合，确认是否为集中扫描。"
