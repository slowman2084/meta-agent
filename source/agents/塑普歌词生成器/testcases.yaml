testcases:
  - id: 0
    name: "基础短句转换"
    description: "测试基础短句的完整转换"
    Input: |
      你吃饭了吗？
      我不知道去哪里玩。
    ExpectedOutput: |
      【原歌词】
      你吃饭了吗？
      我不知道去哪里玩。

      【塑普版】
      里恰饭哒啵？
      我不晓得克哪里耍咯。

      【逐句对照】
      你吃饭了吗？ → 里恰饭哒啵？
      我不知道去哪里玩。 → 我不晓得克哪里耍咯。

      【转换亮点】
      - "你"→"里"（n/l混）
      - "吃"→"恰"（塑普特色词汇）
      - "吗"→"啵"（语气词转换）
      - "知道"→"晓得"（词汇替换）
      - "去"→"克"（词汇替换）
      - "玩"→"耍"（词汇替换）
    Judge: |
      评分标准：
      1. [40分] 声母转换正确（n/l混、平翘舌混等）
      2. [30分] 词汇替换正确（晓得、克、耍等）
      3. [20分] 语气词使用恰当（啵、咯）
      4. [10分] 保持原句字数和基本结构

  - id: 1
    name: "流行歌曲片段转换-简单"
    description: "测试简单流行歌曲片段的转换"
    Input: |
      后来，我总算学会了如何去爱。
      可惜你早已远去，消失在人海。
    ExpectedOutput: |
      【原歌词】
      后来，我总算学会了如何去爱。
      可惜你早已远去，消失在人海。

      【塑普版】
      后莱，我总损学废棱何如克爱。
      克系里早以远克，消斯在银海。

      【逐句对照】
      后来，我总算学会了如何去爱。 → 后莱，我总损学废棱何如克爱。
      可惜你早已远去，消失在人海。 → 克系里早以远克，消斯在银海。

      【转换亮点】
      - "来"→"莱"（韵母ai→ei）
      - "算"→"损"（平舌音）
      - "会"→"废"（f→h反向）
      - "了"→省略或用"哒"
      - "如何"→"何如"（湖南话倒装）
      - "去"→"克"
      - "可"→"克"（平翘舌混）
      - "惜"→"系"（x保持）
      - "你"→"里"
      - "已"→"以"
      - "消失"→"消斯"（平翘舌混）
      - "人"→"银"（r→y）
    Judge: |
      评分标准：
      1. [30分] 声母转换正确（平翘舌、n/l、f/h等）
      2. [25分] 韵母转换正确（ai→ei等）
      3. [25分] 保持歌词韵律和节奏
      4. [20分] 词汇自然流畅，符合塑普语感

  - id: 2
    name: "四字/短句押韵测试"
    description: "测试押韵短句的转换"
    Input: |
      天空是蔚蓝的
      心情是美好的
    ExpectedOutput: |
      【原歌词】
      天空是蔚蓝的
      心情是美好的

      【塑普版】
      舔孔斯为兰滴
      心琴斯美豪滴

      【逐句对照】
      天空是蔚蓝的 → 舔孔斯为兰滴
      心情是美好的 → 心琴斯美豪滴

      【转换亮点】
      - "天"→"舔"（声调1→3）
      - "空"→"孔"（k不变，韵母变化）
      - "是"→"斯"（平翘舌混，声调4→1）
      - "蔚"→"为"（保留）
      - "蓝"→"兰"（保留）
      - "的"→"滴"（轻声处理）
      - "情"→"琴"（q→保持，ing→in）
      - "美"→保留或"米"
      - "好"→"豪"（声调3→2）
    Judge: |
      评分标准：
      1. [30分] 声母转换准确
      2. [30分] 韵母/声调转换准确
      3. [25分] 押韵保持
      4. [15分] 语气自然

  - id: 3
    name: "复杂流行歌曲片段"
    description: "测试较长歌词片段的转换"
    Input: |
      我想要飞得更高，飞得更高。
      狂风一样舞蹈，挣脱怀抱。
    ExpectedOutput: |
      【原歌词】
      我想要飞得更高，飞得更高。
      狂风一样舞蹈，挣脱怀抱。

      【塑普版】
      我响要灰得告豪，灰得告豪。
      黄轰一羊舞倒，怎脱怀抱。

      【逐句对照】
      我想要飞得更高，飞得更高。 → 我响要灰得告豪，灰得告豪。
      狂风一样舞蹈，挣脱怀抱。 → 黄轰一羊舞倒，怎脱怀抱。

      【转换亮点】
      - "想"→"响"（x→保持，iang→ian近似）
      - "飞"→"灰"（f→h）
      - "更"→"告"（g→保持，eng→en近似）
      - "高"→"豪"（g→保持，声调1→2近似）
      - "狂"→"黄"（k→h，uang→uan）
      - "风"→"轰"（f→h，eng→en）
      - "一样"→"一羊"（保留或简化）
      - "舞蹈"→"舞倒"（d→保持，ao→近似）
      - "挣"→"怎"（zh→z，eng→en）
      - "脱"→保留
    Judge: |
      评分标准：
      1. [25分] 复杂声母转换正确（f/h、zh/z等）
      2. [25分] 韵母/声调转换合理
      3. [25分] 保持原歌词节奏感
      4. [25分] 整体流畅度和塑普味道

  - id: 4
    name: "包含人称代词的转换"
    description: "测试人称代词的转换"
    Input: |
      你的笑容让我想起我的童年。
      那时候天很蓝，我们很开心。
    ExpectedOutput: |
      【原歌词】
      你的笑容让我想起我的童年。
      那时候天很蓝，我们很开心。

      【塑普版】
      里滴孝容让我响起我滴同连。
      辣个时候天很兰，我们蛮开心。

      【逐句对照】
      你的笑容让我想起我的童年。 → 里滴孝容让我响起我滴同连。
      那时候天很蓝，我们很开心。 → 辣个时候天很兰，我们蛮开心。

      【转换亮点】
      - "你"→"里"
      - "的"→"滴"
      - "容"→"容"或"用"（r→y）
      - "让"→"样"或保留（r→y/l）
      - "想"→"响"
      - "起"→保留
      - "童"→"同"（t→保持，ong→un近似）
      - "年"→"连"（n→l）
      - "那"→"辣"
      - "很"→"蛮"（塑普特色词汇）
    Judge: |
      评分标准：
      1. [35分] 人称代词转换正确（你→里）
      2. [25分] n/l声母转换正确（年→连等）
      3. [20分] 塑普特色词汇使用（蛮）
      4. [20分] 整体协调性

