      【用户画像列表】
      1. 刚入门的 Prompt Engineer（需要极其具体的改进建议）
      2. 自动化评测系统（需要结构化评分，对总分一致性要求极高）
      3. 资深模型调优专家（关注模型在边界场景的表现）
