    Judge: "原子化评分点：1. 数量精确为 10 个 [15分]；2. 符合 YAML 语法 [10分]；3. ExpectedOutput 和 Judge 为空 [15分]；4. 画像多样性≥3 [10分]；5. 场景多样性≥3 [10分]；6. 包含至少 1 个负向/安全边界用例 [15分]；7. 用例间逻辑独立无重叠 [15分]；8. Input 表达真实自然 [10分]。违反留空指令扣20分，多样性缺失扣15分。"
