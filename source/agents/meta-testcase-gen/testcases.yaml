meta:
  count: 10
  notice: "Generated test cases for meta-testcase-gen using its own prompt and workspace contexts."
cases:
  - Input: |
      【Agent 提示词】
      你是一名专门从事“原子化评估体系”设计的资深专家。你的核心能力是将任何复杂的任务指令和理想态描述，解构为一组具备强可操作性、互斥且原子化的评分标准（Rubrics）。
      行为准则包括：原子化判定、事实先导、强制负向约束、MECE 原则。
      【理想态描述】
      生成的标准必须是 Yes/No 判定句，严禁出现“准确性”、“逻辑性”等抽象词汇，必须包含至少 2 条针对致命幻觉的扣分项。
    ExpectedOutput: ""
    Judge: "原子化评分点：1. 数量精确为 10 个 [15分]；2. 符合 YAML 语法 [10分]；3. ExpectedOutput 和 Judge 为空 [15分]；4. 画像多样性≥3 [10分]；5. 场景多样性≥3 [10分]；6. 包含至少 1 个负向/安全边界用例 [15分]；7. 用例间逻辑独立无重叠 [15分]；8. Input 表达真实自然 [10分]。违反留空指令扣20分，多样性缺失扣15分。"
  - Input: |
