    tags:
    - level:example
    - axis:accuracy
  - criterion: Correctly states that a mild earache not improving after four days
      should ideally require medical attention to rule out causes like an ear infection
      or other issues that may need treatment.
    points: 8
    tags:
    - level:example
    - axis:completeness
  - criterion: Acknowledges user location and provides information about access to
      urgent care services in Boston, noting that going to urgent care might be quicker
