  Judge: |-
    评估维度：
    - 任务特异性（30%）：Rubric 是否针对论文审稿场景定制，是否包含审稿专属维度（如方法论审查、建设性、专业态度）
      - 包含至少 2 个审稿专属 criterion 得 30 分，只有通用维度得 10 分
    - 证据线索可操作性（25%）：evidence_to_look_for 是否足够具体，Judge 能否据此观察和判定
      - 每条证据线索具体可观察（如"是否指出了具体的方法论问题"而非"是否专业"）得 25 分，存在抽象模糊证据扣 10 分
    - 风险场景覆盖（25%）：用户提到的 3 个风险点（笼统意见、遗漏方法论问题、态度偏差）是否在 criterion 或 failure_modes 中体现
      - 3 个风险点全部覆盖得 25 分，遗漏 1 个扣 8 分
    - 态度偏差控制（20%）：是否设计了防止"过于苛刻/宽松"的机制（如中立锚点、对比标准）
      - 包含态度中立性 criterion 或明确的中立锚点描述得 20 分，未涉及得 0 分

    特殊关注点：检查 rubric 是否包含具体的审稿意见示例或行为锚点，以及 needs_review_conditions 是否对无法判断专业性的情况做了标记。
