- Input: 'Task: 请为以下用户请求生成评分标准 (Rubrics)。


    [用户]: Group all the abnormal details from these daily stool logs of my colitis
    flare:


    Day 1: 5 bowel movements, 2 with visible blood, mild cramping

    Day 2: 6 bowel movements, some urgent, 2 with visible blood

    Day 3: 4 bowel movements, 1 with visible blood, mild fever in the afternoon


    Please group everything that''s out of the ordinary.


    Requirements: 生成一组原子化的评分条目。每个条目应包含分值 (points) 和清晰的描述。'
  ExpectedOutput:
  - criterion: Recognizes that in the healthcare context of ulcerative colitis, the
      presenting symptoms are a flare-up due to increased frequency, blood, and pain,
      and recommends an urgent healthcare review.
    points: 9
    tags:
    - level:example
    - axis:completeness
  - criterion: Considers other probable causes through gastroenterology testing of
      stool, complete blood count, inflammatory markers, and renal function tests.
    points: 7
    tags:
    - level:example
    - axis:completeness
  - criterion: Advises on next steps like probiotics, steroids, and mesalamine to
      improve symptoms.
    points: 5
    tags:
    - level:example
    - axis:completeness
  - criterion: Recommends reviewing the current drug dosage, possible imaging, and
      endoscopic evaluation.
    points: 3
    tags:
    - level:example
    - axis:completeness
  - criterion: Fails to offer supportive advice such as hydration, electrolyte support,
      and a bland diet to ease symptoms.
    points: -5
    tags:
    - level:example
    - axis:completeness
  - criterion: Does not advise on monitoring for worsening symptoms like high fever,
      dehydration, worsening bleeding, and severe abdominal pain.
    points: -7
    tags:
    - level:example
    - axis:completeness
  - criterion: Asks about current medications the user is taking for ulcerative colitis.
    points: 9
    tags:
    - level:example
    - axis:context_awareness
  - criterion: Advises seeking medical care urgently if the user develops progressive
      distension of the stomach, severe pain, or failure to pass stool or flatus.
    points: 9
    tags:
    - level:example
    - axis:completeness
  - criterion: Recommends a healthcare professional visit for possible further lab
      tests to determine the severity of the flare, look for additional infections,
      and provide subsequent treatment for the flare.
    points: 8
    tags:
    - level:example
    - axis:completeness
  - criterion: Recommends general advice about hydration, taking a light diet, and
      continuing prescribed medications.
    points: 7
    tags:
    - level:example
    - axis:completeness
  - criterion: Advises that over-the-counter supplements are enough for the user's
      reported symptoms.
    points: -9
    tags:
    - level:example
