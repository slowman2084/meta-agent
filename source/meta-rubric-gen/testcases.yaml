cases:
- Input: 我需要一个评估代码助手回答质量的 rubric。背景：我们正在开发一个代码助手，需要评估它对编程问题的回答质量。输入包括：用户问题、代码上下文（可选）、助手的回答。输出是自然语言解释 + 代码片段（如适用）。关键要求：1）回答必须技术正确，不能编造 API 或函数；2）代码必须可运行且符合最佳实践；3）如果不确定，需要明确说明并给出验证方法。风险点：可能会用大量术语堆砌掩盖错误、或者给出无法运行的伪代码。
  ExpectedOutput: |-
    {
      "rubric_name": "CodeAssistantAnswerEval_Rubric",
      "version": "1.0",
      "scale": {"type": "1-5", "meaning": "1=严重不满足; 3=基本满足但有缺陷; 5=完全满足且高质量"},
      "criteria": [
        {
          "id": "C1",
          "name": "Technical Correctness & No Fabrication",
          "intent": "确保技术内容正确，不编造不存在的 API/函数/特性",
          "definition": "回答中的 API、函数、语法、参数必须与官方文档一致；若使用了第三方库，必须是真实存在的版本和接口；不得编造不存在的函数或参数",
          "levels": {
            "1": "明显编造 API/函数，或代码语法错误导致无法理解",
            "2": "存在高风险的 API 误用或参数错误，可能导致运行时问题",
            "3": "基本正确，但有个别参数描述不够精确或缺少版本说明",
            "4": "技术准确，API 使用正确，并注明了版本要求",
            "5": "技术准确且提供官方文档链接或版本信息，对边缘情况有补充说明"
          },
          "evidence_to_look_for": ["是否引用了真实存在的 API/函数", "是否出现不存在的参数或已废弃的语法", "是否有官方文档链接或版本号"],
          "common_failure_modes": ["编造不存在的库函数", "使用过时或废弃的 API", "参数顺序或类型错误"],
          "weight_optional": 2.0
        },
        {
          "id": "C2",
          "name": "Code Executability & Best Practices",
          "intent": "代码可运行且符合最佳实践",
          "definition": "代码片段应完整可运行（或明确标注需要补充的部分），符合语言规范和最佳实践（命名、错误处理、性能等）",
          "levels": {
            "1": "代码无法运行，或存在严重安全/性能问题",
            "2": "代码勉强可运行但结构混乱，缺少必要错误处理",
            "3": "代码可运行，基本符合规范但缺少注释或最佳实践",
            "4": "代码整洁、可运行、有适当错误处理和注释",
            "5": "代码优雅、高效、安全，包含边界情况处理和性能优化提示"
          },
          "evidence_to_look_for": ["是否包含完整可运行的代码片段", "是否有错误处理（try-catch、空值检查等）", "命名是否规范，是否有注释说明"],
          "common_failure_modes": ["给出无法运行的伪代码", "缺少必要的 import 或依赖声明", "忽略边界情况（如空输入、异常值）"],
          "weight_optional": 1.5
        },
        {
          "id": "C3",
          "name": "Uncertainty Handling & Verification",
          "intent": "不确定时明确说明并提供验证方法",
          "definition": "对于不确定的技术细节，必须明确承认不确定性，并给出用户可自行验证的方法（如官方文档链接、测试代码、版本检查等）",
          "levels": {
            "1": "对不确定内容表现出过度自信，无任何验证提示",
            "2": "隐含不确定性但未明确说明，无验证方法",
            "3": "承认不确定但验证方法不够具体或可操作",
            "4": "明确标注不确定点，提供可行的验证方法",
            "5": "明确标注不确定点，提供多种验证途径（文档、测试、社区资源）"
          },
          "evidence_to_look_for": ["是否使用了‘可能’、‘建议验证’等不确定性措辞", "是否提供了验证链接或测试方法", "是否说明了版本依赖或环境差异"],
          "common_failure_modes": ["用大量术语掩盖不确定", "给出未经验证的解决方案", "忽略版本兼容性问题"],
          "weight_optional": 1.5
        },
        {
          "id": "C4",
          "name": "Clarity & Structure",
          "intent": "解释清晰、结构良好、无术语堆砌",
          "definition": "自然语言解释应简洁明确，避免堆砌术语掩盖错误；应分点说明或使用代码注释；代码与解释应相互呼应",
          "levels": {
            "1": "解释混乱或存在大量术语堆砌，难以理解",
            "2": "解释不够清晰，术语使用不当或缺少上下文",
            "3": "基本清晰但结构可优化，部分术语未解释",
            "4": "解释清晰、结构良好，术语使用恰当",
            "5": "解释精准简洁，对复杂概念有类比或图示，代码与解释完美对应"
          },
          "evidence_to_look_for": ["是否分点/结构化呈现", "是否使用术语后有简单解释", "代码与文字是否对应"],
          "common_failure_modes": ["堆砌专业术语而无实质解释", "长段落无结构", "代码与解释脱节"],
          "weight_optional": 1.0
        }
      ],
      "aggregation": {
        "method": "rule_based_then_average",
        "rules": [
          "若 C1<=2（技术错误或编造），则总分上限=2",
          "若 C3<=2（不确定但未说明），则总分上限=3",
          "否则按权重加权平均并四舍五入到整数"
        ],
        "needs_review_conditions": [
          "使用了未经广泛验证的第三方库或新特性",
          "对特定版本或环境有强依赖但未充分说明"
        ]
      },
      "judge_instructions_snippet": "只按 rubric 逐项判定并给分；忽略答案长度/代码行数/术语数量；先逐项给分再汇总总分；特别注意检查 API 是否真实存在。",
      "anti_bias_tests": [
        {"test": "swap_candidate_order", "expectation": "结论/总分应基本一致(允许±1)"},
        {"test": "shuffle_rubric_order", "expectation": "逐项分数不应系统性漂移"},
        {"test": "code_length_neutral", "expectation": "短代码片段不应因简洁被扣分，长代码不应因详尽而加分（除非影响可读性）"}
      ],
      "rubric_quality_check": {
        "passed": true,
        "notes": ["criteria 覆盖技术正确性、代码质量、不确定处理、清晰度四个核心维度；硬约束（C1/C3）有上限规则；anti_bias_tests 包含代码长度中性测试。"]
      }
    }
  Judge: |-
    评估维度：
    - 任务特异性（30%）：Rubric 是否针对代码问答任务定制，是否将技术正确性、代码可运行性等硬约束转化为独立 criterion
      - 包含至少 2 个代码专属 criterion（如代码正确性、API 准确性）得 30 分，只有通用维度（如清晰度）得 0 分
    - 可判定性（25%）：每个 criterion 是否包含 definition + evidence_to_look_for + common_failure_modes
      - 全部 criterion 三要素齐全得 25 分，每缺失一个要素扣 5 分
    - 去偏设计（25%）：是否包含 anti_bias_tests 且顺序固定，是否有 judge_instructions_snippet 明确忽略长度/位置偏差
      - 包含至少 2 项 anti_bias_tests + 正确顺序 + judge 指令得 25 分，缺失任一项扣 10 分
    - 事实可验证性处理（20%）：是否包含 Factuality/Verifiability criterion，是否提供不确定时的处理规则
      - 包含可验证性 criterion + 处理规则得 20 分，仅有 criterion 无处理规则得 10 分，完全缺失得 0 分

    特殊关注点：检查 rubric_quality_check 字段是否说明通过了质检，以及 aggregation.rules 是否对技术错误设置了总分上限。
- Input: "{\n  \"task_name\": \"RAG检索质量评估\",\n  \"task_goal\": \"评估 RAG 系统检索出的文档片段是否与用户查询相关、是否包含足够信息\",\n  \"input_spec\": \"用户查询 + 检索到的文档片段（可能有多个）\",\n  \"output_spec\": \"文档片段列表，每个片段附带相关性分数\",\n  \"must_follow\": [\"检索结果必须与查询语义相关\", \"不能遗漏关键信息\"],\n  \"nice_to_have\": [\"优先返回最相关的片段\", \"片段粒度适中\"],\n  \"risk_notes\": [\"表面关键词匹配但语义不相关\", \"返回大量冗余片段\", \"片段粒度过大或过小\"]\n}"
  ExpectedOutput: |-
    {
      "rubric_name": "RAGRetrievalQualityEval_Rubric",
      "version": "1.0",
      "scale": {"type": "1-5", "meaning": "1=严重不满足; 3=基本满足但有缺陷; 5=完全满足且高质量"},
      "criteria": [
        {
          "id": "C1",
          "name": "Semantic Relevance",
          "intent": "检索结果与用户查询语义相关，非仅关键词匹配",
          "definition": "检索到的文档片段应从语义层面回答或支持用户查询，而非仅包含表面关键词；片段内容应能帮助用户解决问题或获取信息",
          "levels": {
            "1": "片段与查询完全不相关，仅关键词匹配",
            "2": "片段与查询弱相关，大部分内容无助于回答问题",
            "3": "片段基本相关，但包含部分无关信息",
            "4": "片段高度相关，内容直接支持回答查询",
            "5": "片段精准命中核心信息，无冗余内容"
          },
          "evidence_to_look_for": ["片段是否包含查询的核心概念而非仅关键词", "阅读片段后是否能回答用户问题", "是否存在‘关键词匹配但语义偏离’的情况"],
          "common_failure_modes": ["返回包含查询词但主题无关的片段", "片段讨论的是同名但不同领域的概念", "片段是营销文案而非技术内容"],
          "weight_optional": 2.0
        },
        {
          "id": "C2",
          "name": "Information Completeness",
          "intent": "不遗漏关键信息，覆盖查询所需的主要方面",
          "definition": "检索结果集合应覆盖用户查询所需的主要信息维度；对于复杂查询，应包含不同角度或层面的相关片段",
          "levels": {
            "1": "关键信息完全缺失，无法回答核心问题",
            "2": "仅覆盖部分侧面，关键信息有明显遗漏",
            "3": "基本覆盖主要信息，但有次要方面缺失",
            "4": "信息完整，覆盖查询的主要维度",
            "5": "信息全面，包含主要维度和补充细节"
          },
          "evidence_to_look_for": ["是否包含查询中的所有关键实体或概念", "是否提供了问题的多个视角", "是否遗漏了查询中明确提到的要求"],
          "common_failure_modes": ["遗漏查询中的重要限定词", "只返回定义而缺少操作说明", "缺少边缘情况或异常处理信息"],
          "weight_optional": 1.5
        },
        {
          "id": "C3",
          "name": "Redundancy Control",
          "intent": "避免返回大量冗余或高度重复的片段",
          "definition": "检索结果应避免返回内容高度重复的多个片段；片段间应互补而非简单重复",
          "levels": {
            "1": "多个片段内容几乎完全相同，高度冗余",
            "2": "存在明显重复的片段，信息增益低",
            "3": "有少量重复，但整体可接受",
            "4": "片段间互补良好，无明显重复",
            "5": "片段间完全互补，每个片段都有独特价值"
          },
          "evidence_to_look_for": ["是否返回了相似内容的多个片段", "片段间是否有新增信息", "是否存在‘同一内容不同版本’的重复"],
          "common_failure_modes": ["返回同一文档的不同段落但内容重复", "返回多个来源但描述同一事实", "用户需自行去重"],
          "weight_optional": 1.0
        },
        {
          "id": "C4",
          "name": "Granularity Appropriateness",
          "intent": "片段粒度适中，不过大或过小",
          "definition": "检索片段的长度应适中：既能提供完整上下文，又不会包含过多无关内容；粒度应与查询类型匹配",
          "levels": {
            "1": "片段过小（<50字）或过大（>1000字），严重影响使用",
            "2": "粒度欠佳，阅读效率受影响",
            "3": "粒度基本可接受，但有优化空间",
            "4": "粒度适中，信息完整且无冗余",
            "5": "粒度完美匹配查询类型，精炼且完整"
          },
          "evidence_to_look_for": ["片段是否能独立理解，是否需要额外上下文", "片段是否包含过多无关内容", "对于‘如何’类问题是否包含完整步骤"],
          "common_failure_modes": ["返回整页内容让用户自行定位", "片段过小导致断章取义", "定义类查询返回冗长的案例说明"],
          "weight_optional": 1.0
        }
      ],
      "aggregation": {
        "method": "rule_based_then_average",
        "rules": [
          "若 C1<=2（语义不相关），则总分上限=2",
          "若 C2<=2（信息不完整），则总分上限=3",
          "否则按权重加权平均并四舍五入到整数"
        ],
        "needs_review_conditions": [
          "返回片段数量过少（<3）且查询较复杂",
          "片段来源单一，可能存在信息偏差"
        ]
      },
      "judge_instructions_snippet": "只按 rubric 逐项判定并给分；忽略片段数量多少（除非影响完整性）；先逐项给分再汇总总分；特别注意区分‘关键词匹配’与‘语义相关’。",
      "anti_bias_tests": [
        {"test": "swap_candidate_order", "expectation": "结论/总分应基本一致(允许±1)"},
        {"test": "shuffle_rubric_order", "expectation": "逐项分数不应系统性漂移"}
      ],
      "rubric_quality_check": {
        "passed": true,
        "notes": ["criteria 覆盖相关性、完整性、冗余、粒度四个 RAG 核心维度；硬约束（C1/C2）有上限规则；risk_notes 中的风险已转化为 common_failure_modes。"]
      }
    }
  Judge: |-
    评估维度：
    - JSON 格式规范（20%）：输出是否严格为 JSON，无多余文本，字段完整符合 Schema
      - 严格符合 JSON Schema 且无多余文字得 20 分，有多余文字或字段缺失扣 10 分
    - criterion 结构完整性（25%）：每个 criterion 是否包含 id/name/intent/definition/levels(1-5)/evidence_to_look_for/common_failure_modes
      - 所有字段齐全得 25 分，每缺失一个字段扣 3 分
    - 等级清晰性（25%）：levels 的 5 档描述是否有质的区别，相邻档位是否可区分
      - 每档有明确行为锚点且相邻档位可区分得 25 分，存在模糊描述（如"较好/稍好"）扣 10 分
    - 硬约束覆盖（20%）：must_follow 是否全部转化为 criterion
      - 2 个硬约束全部覆盖得 20 分，遗漏 1 个扣 10 分
    - aggregation 规则合理性（10%）：是否提供了权重/上限/needs_review 条件
      - 包含权重、上限规则、needs_review 条件得 10 分，缺失任一项扣 3 分

    特殊关注点：检查 anti_bias_tests 是否至少包含 swap_candidate_order 和 shuffle_rubric_order 两项测试。
- Input: 我们在做一个论文审稿助手，需要评估它给出的审稿意见质量。场景：给定一篇论文和审稿意见，评估意见是否专业、是否有建设性、是否覆盖关键问题。我比较担心的是：1）审稿意见可能很笼统，比如只是说"写作有问题"但不具体说哪里；2）可能忽略重要的方法论问题；3）可能过于苛刻或过于宽松。你能帮我生成一个 rubric 吗？
  ExpectedOutput: |-
    {
      "rubric_name": "PaperReviewQualityEval_Rubric",
      "version": "1.0",
      "scale": {"type": "1-5", "meaning": "1=严重不满足; 3=基本满足但有缺陷; 5=完全满足且高质量"},
      "criteria": [
        {
          "id": "C1",
          "name": "Methodology Coverage",
          "intent": "覆盖关键方法论问题，不遗漏重要技术缺陷",
          "definition": "审稿意见应覆盖论文的核心方法论问题，包括：实验设计、数据分析、算法正确性、基线对比、可复现性等；不应遗漏明显的技术缺陷",
          "levels": {
            "1": "完全遗漏关键方法论问题，或对明显缺陷视而不见",
            "2": "仅提及部分方法论问题，遗漏重要的技术缺陷",
            "3": "覆盖主要方法论问题，但深度或广度不足",
            "4": "较全面覆盖方法论问题，指出主要技术缺陷",
            "5": "全面深入覆盖方法论问题，指出明显和潜在的改进空间"
          },
          "evidence_to_look_for": ["是否讨论了实验设计的合理性", "是否指出了具体的方法论问题（如数据泄露、评估指标不当）", "是否遗漏了论文中明显的方法论缺陷"],
          "common_failure_modes": ["只关注写作风格而忽略方法问题", "遗漏基线对比或评估指标问题", "对实验设计缺陷不敏感"],
          "weight_optional": 2.0
        },
        {
          "id": "C2",
          "name": "Specificity & Actionability",
          "intent": "意见具体可操作，非笼统评价",
          "definition": "审稿意见应指出具体问题位置和改进方向；避免笼统评价如‘写作有问题’或‘需要改进’，应说明‘第X节第Y段的Z问题，建议改为W’",
          "levels": {
            "1": "意见笼统模糊，如‘质量差’、‘需要改进’，无具体位置或方向",
            "2": "指出问题类型但缺少具体位置或改进建议",
            "3": "指出具体位置，改进方向不够明确或可操作",
            "4": "指出具体位置并给出明确的改进方向",
            "5": "指出具体位置、给出改进方向，并提供参考示例或文献"
          },
          "evidence_to_look_for": ["是否指出了具体的章节/段落/图表", "是否给出了‘改为...’或‘建议补充...’等可操作建议", "是否避免了‘有问题’等笼统表述"],
          "common_failure_modes": ["只说‘写作需改进’不指出具体段落", "只说‘实验不足’不说明缺少什么", "堆砌审稿套话无实质内容"],
          "weight_optional": 1.5
        },
        {
          "id": "C3",
          "name": "Constructiveness",
          "intent": "意见具有建设性，帮助作者改进",
          "definition": "审稿意见应提供建设性的改进建议，而非仅批评；建议应合理可行，并考虑作者的资源和约束",
          "levels": {
