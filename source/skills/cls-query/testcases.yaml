  ExpectedOutput: "📋 **摘要**：2026-03-09 ~ 2026-03-16 | Topic: `tdsql-c-for-mysql-bypass-sycft` | Content-Type 分布统计 | ⚠️ **估算值，误差 ≤5%（腾讯云CLS HyperLogLog实现）**，基于 10% 采样还原\n\n## 📊 Content-Type 各值统计\n\n> 注意：该 Topic 的日志为非结构化日志，没有独立的 `reqHeader.content-type` 字段。以下结果是从 `__CONTENT__` 日志正文中通过正则 `Content-Type[...][value]` 提取统计的。\n\n```sql\n-- 使用的 CQL\ncontent-type \n| SELECT regexp_extract(\"__CONTENT__\", 'Content-Type[^\\]]*\\[([^\\]]+)\\]', 1) AS content_type, \n         COUNT(*) AS cnt \n  FROM log \n  WHERE \"__CONTENT__\" LIKE '%Content-Type%' \n    AND regexp_extract(\"__CONTENT__\", 'Content-Type[^\\]]*\\[([^\\]]+)\\]', 1) IS NOT NULL \n  GROUP BY content_type \n  ORDER BY cnt DESC\n```\n\n| Content-Type 值 | 采样命中数 | 估算总量（×10） | 占比 |\n|---|---|---|---|\n| `text/html;charset=utf-8` | 38,598 | **~385,980** | **69.0%** |\n| `application/x-www-form-urlencoded` | 17,349 | **~173,490** | **31.0%** |\n| **合计** | 55,947 | **~559,470** | 100% |\n\n## 🔍 核心结论\n\n本周日志中涉及 HTTP Content-Type 的请求共约 **55.9 万条**，仅存在 **2 种** Content-Type 值：\n\n1. **`text/html;charset=utf-8`**（约 38.6 万条，69%）—— 主要为 HTTP 响应中带回的 Content-Type，出现在 `[result]` 日志中\n2. **`application/x-www-form-urlencoded`**（约 17.3 万条，31%）—— 为请求发送时的 header，出现在 `[header]` 和 `the header is:` 日志中\n\n> 💡 两者约 2:1 的比例符合预期：每次 HTTP 请求会产生 1 条请求 header 日志 + 1 条响应结果日志（含响应 Content-Type），`text/html` 出现次数约为 `x-www-form-urlencoded` 的 2 倍，说明部分请求的响应日志中也被正则匹配到了 Content-Type。\n\n## 🛠️ 建议\n\n- **如需精确区分请求 header 和响应 header 的 Content-Type**，可进一步按日志关键词 `[header]`（请求）和 `[result]`（响应）分别筛选统计\n- **如需结构化 `reqHeader` 字段**，建议在 CLS 配置提取规则，将 `Content-Type` 从 `__CONTENT__` 中提取为独立索引字段，后续查询效率更高\n"
