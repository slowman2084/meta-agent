onse` 一个签名就贡献了全部告警的 **~81%**，涉及中国、美国、新加坡三国来源。这表明**可能存在大量主机通过 DNS 隧道进行 C2 通信**，属于 APT 级别威胁，基于通用安全经验，DNS Beacon 告警应为 0，当前量级极度异常。\n\n2. **加拿大、印度来源以 DNS 放大攻击为主**：加拿大 93% 的告警为 `DNS Amplification Attack`，属于 DDoS 攻击行为，需关注目标服务器是否出现带宽饱和。\n\n3. **SSH 异常协议**来自中国（2,313）和法国（154），可能是暴力破解或协议探测。\n\n4. **SQL 注入告警**（344条）虽量不大，但属于直接针对应用层的攻击，风险极高。\n\n---\n\n## 🛠️ 建议\n\n- [ ] **【紧急】排查 DNS Beacon 后门**：对触发 `dns-beacon-live-response` 的 `dest_ip`（被回调主机）进行排查，确认是否已被植入后门。可执行：\n  ```sql\n  * | SELECT dest_ip, APPROX_DISTINCT(src_ip) AS src_cnt, COUNT(*) AS cnt \n  FROM log WHERE \"alert.signature\" = 'dns-beacon-live-response' \n  GROUP BY dest_ip ORDER BY cnt DESC LIMIT 10\n  ```\n- [ ] **【高优】封堵加拿大/印度来源的 DNS 放大攻击 IP**：按 `src_ip` 聚合 Top IP 并加入防火墙黑名单\n- [ ] **【中优】排查 SQL 注入来源**：下钻 SQL 注入告警的具体 payload 和目标路径，确认 WAF 规则是否覆盖\n- [ ] **【建议】对 NULL 国家（120条）的 IP 段进行人工归属确认**，可能是内网 IP 或新分配 IP 段未更新地理库  "
