    ### 参数分类统计


    | 参数类型 | 典型参数 | 出现次数 | 占比 | 说明 |

    |---------|---------|---------|-----|------|

    | **WebSocket 连接** | fileId, X-Team-Id, X-Org-Id, tracking_session_id, EIO, transport | ~100+ | ~60% | 文件协作实时通信 |

    | **时间戳** | t | ~10 | ~5% | 防缓存随机参数 |

    | **重定向** | redirect | ~5 | ~3% | 登录后跳转 |

