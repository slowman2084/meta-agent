      ---
      分享类型：分享型
      场次定位：QCon 管理专场
      时间限制：45 分钟
      听众：研发经理、测试/质量负责人、技术负责人，以及正在推动团队 AI 落地的管理者
      一句话主题：超级团队的三段进化
      核心传递物：AI 时代的超级团队，不是"人人会用 AI"就够了，而是要完成从工作流融入，到理想态驱动的精准优化，再到反馈闭环支撑的 AI 自驱进化

      核心矛盾：大家以为团队只要多用 AI 就会自然进化，但现实是大量使用停留在零散、粗放、不可持续的阶段；真正的分水岭在于能否定义理想态并建立可闭合的反馈循环

      原始素材包括：
      - 团队活跃用户数接近 100% 与人均使用时长数据
      - 三类推动力：中山线下会、每周闪电分享、模型进步
      - 两类增长解法：拓展团队边界 vs 融入真实工作流
      - 理想态定义的重要性（代码知识库案例）
      - 概率模型"乍看不错"的问题
      - 并发与睡后工作未兑现的原因
      - 管理难点：让组织把经验、标准和反馈持续喂给 AI

      References 目录包含 30+ 文件：会议记录、分享材料、白皮书案例图片、数据图表等
      ---

      请为这个 QCon 外部大会分享设计一波三折的思维导图结构。
    ExpectedOutput: |
      期望输出文件：testcase-superteam/mindmap.md

      期望结构：
      - 主标题：超级团队进行时
      - 副标题：从用 AI 到 AI 自己找活干

      - 开场（几乎 100% 都在用 AI 了）
        * 现场共识：当前不是谈论用不用的时候
        * 活跃用户数近100%，中山线下会/每周闪电分享/模型进步三类推动力

      - 第1折：已经几乎人人都在用，为什么人均每天还不到 1 小时
        * 表面是工具问题，本质是组织默认值没变
        * 四类管理动作：带团队往下游看、把隐性经验挖成 AI 能消费的上下文、流程是稳定产出的前提、AI 纳入文化而非考核
        * 案例：性能数据变成"弹药"、CodeBuddy 串起全链路
        * 效果：人均使用时长从 1h 走到 4h

      - 第2折：最危险的时刻，不是不会用，而是"看起来很会用"
        * 人类幻觉的本质：概率模型天然补全"看着像对的答案"
        * 常见的假方案：继续卷提示词/调流程/换模型/堆外壳
        * 真问题："什么算好"没有定义
        * 四类管理动作：让最懂业务的人定义主需和评价标准、把"感觉不错"变成"可以打分"、把理解从"会复述"升级为"能考试"、让理想态持续显影
        * 案例："看起来没问题/实际问题一堆"对比图、代码知识库从 10 分走到 90 分、测试工作价值升级

      - 第3折：为什么大家都在谈 Agent，但并发和睡后工作还是没起来
        * 一句话：7x24 不是模型能力，而是组织能力
        * 三座大山：成本、场景、认知负担
        * 三座山的解法：用理想态换低成本模型、只挑存在迭代闭环的场景、让 AI 把问答题变成选择题
        * 案例：三郎迭代优化数据库代码、竞品 Agent 全链路闭环、AI 翻译+人工验收

      - 过渡：三折背后指向同一个底层问题——认知负担

      - 升维总结（道法术器框架）
        * 道：追求"让人类只做最值得人做的事"，重新分配注意力
        * 法：特种兵模式 vs 集团军模式的阶段演进
        * 术：主动 Agent、长程 Agent、共脑三招解认知负担
        * 器：Skill/MCP/知识库等工具只是最后一层

      - 结尾：1 把钥匙开 3 把锁
        * 一条路线：融入 -> 精准 -> 自驱，不可跳步
        * 三个判断问题：定义理想态了吗？建立反馈闭环了吗？沉淀成 AI 能消费的上下文了吗？
        * 角色变化：成员从"解决问题的人"变成"定义问题的人"，管理者从"派活的人"变成"设计闭环的人"
        * 带走动作：挑 1 个高频场景定义理想态 → 把 1 条链路做成闭环 → 开 1 个机制持续沉淀经验

    Judge:
